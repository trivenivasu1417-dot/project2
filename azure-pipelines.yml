trigger:
- main

pool:
  vmImage: ubuntu-22.04

variables:
  terraformVersion: '1.6.6'
  workingDir: 'enivironments/dev'

stages:

# =========================
# PLAN
# =========================
- stage: TerraformPlan
  jobs:
  - job: plan
    steps:

    # FORCE INSTALL TERRAFORM (IMPORTANT FIX)
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    # INIT
    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workingDir)
        backendServiceArm: 'Bootcamp-Project-2'
        backendAzureRmResourceGroupName: 'demo-rg'
        backendAzureRmStorageAccountName: 'demobackendtristore321'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'aks.tfstate'

    # PLAN
    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: 'Bootcamp-Project-2'


# =========================
# APPLY
# =========================
- stage: TerraformApply
  dependsOn: TerraformPlan
  condition: succeeded()

  jobs:
  - job: apply
    steps:

    # FORCE INSTALL TERRAFORM AGAIN (NEW AGENT)
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    # INIT
    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workingDir)
        backendServiceArm: 'Bootcamp-Project-2'
        backendAzureRmResourceGroupName: 'demo-rg'
        backendAzureRmStorageAccountName: 'demobackendtristore321'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'aks.tfstate'

    # APPLY
    - task: TerraformTaskV4@4
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: 'Bootcamp-Project-2'
        commandOptions: '-auto-approve'
trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.6.6'
  workingDir: 'environments/dev'

stages:

# =========================
# PLAN STAGE
# =========================
- stage: TerraformPlan
  displayName: Terraform Plan
  jobs:
  - job: plan
    steps:

    # Install Terraform
    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: $(terraformVersion)

    # INIT (backend config REQUIRED here only)
    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workingDir)
        backendServiceArm: 'Bootcamp-Project-2'
        backendAzureRmResourceGroupName: 'demo-rg'
        backendAzureRmStorageAccountName: 'demobackendtristore321'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'aks.tfstate'

    # PLAN
    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: 'Bootcamp-Project-2'
        commandOptions: '-out=tfplan'

    # Publish plan artifact
    - publish: $(workingDir)/tfplan
      artifact: tfplan


# =========================
# APPLY STAGE
# =========================
- stage: TerraformApply
  displayName: Terraform Apply
  dependsOn: TerraformPlan
  condition: succeeded()

  jobs:
  - job: apply
    steps:

    # Install Terraform again (required in new agent job)
    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: $(terraformVersion)

    # INIT again (required in separate stage)
    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workingDir)
        backendServiceArm: 'Bootcamp-Project-2'
        backendAzureRmResourceGroupName: 'demo-rg'
        backendAzureRmStorageAccountName: 'demobackendtristore321'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'aks.tfstate'

    # Download plan file
    - download: current
      artifact: tfplan

    # APPLY (correct way)
    - task: TerraformTaskV4@4
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: 'Bootcamp-Project-2'
        commandOptions: 'tfplan'
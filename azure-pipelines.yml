trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.6.6'
  workingDir: 'enivironments/dev'

stages:

- stage: TerraformPlan
  displayName: Terraform Plan
  jobs:
  - job: plan
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workingDir)
        backendServiceArm: 'Bootcamp-Project-2'
        backendAzureRmResourceGroupName: 'demo-rg'
        backendAzureRmStorageAccountName: 'demobackendtristore78921'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'aks.tfstate'

    - task: TerraformTaskV4@4
      displayName: Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: 'Bootcamp-Project-2'

- stage: TerraformApply
  displayName: Terraform Apply
  dependsOn: TerraformPlan
  condition: succeeded()

  jobs:
  - job: apply
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: 'Bootcamp-Project-2'
        commandOptions: '-auto-approve'